# Reference https://github.com/foundry-rs/foundry/tree/master/config
[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
cache_path = 'forge-cache'
optimizer = true
optimizer_runs = 200
solc = '0.8.24'
evm_version = "cancun"

[invariant]
runs = 256
depth = 32
fail_on_revert = false
call_override = false
dictionary_weight = 80
include_storage = true
include_push_bytes = true

[fuzz]
runs = 256
